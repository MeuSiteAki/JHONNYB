  <style>

    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

    :root {
      --bg: #050505;
      --card: #121212;
      --accent: #ffb800;
      --text: #ffffff;
      --text-dim: #888888;
      --danger: #ff4d4d;
      --success: #00e676;
      --border: #222222;
    }

    /* Reset e Geral */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; line-height: 1.4; }

    /* Header e Navegação */
    header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    h1 { font-size: 22px; letter-spacing: -1px; }
    h1 span { color: var(--accent); }

    .tabs { display: flex; gap: 8px; background: #111; padding: 5px; border-radius: 12px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 8px; font-weight: 600; font-size: 13px; transition: 0.3s; }
    .tab-btn.active { background: var(--accent) !important; color: #000 !important; }

    /* Animação de Entrada */
    .content-section { display: none; animation: fadeIn 0.3s ease; }
    .content-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Grid de Pedidos (Delivery) */
    .lista { display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); }
    @media(min-width: 768px) { .lista { grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); } }

    /* --- ÁREA DAS MESAS (MODERNIZADA) --- */
    .grid-mesas { 
      display: grid; 
      gap: 15px; 
      grid-template-columns: repeat(2, 1fr); /* 2 colunas no celular */
    }

    @media(min-width: 768px) { 
      .grid-mesas { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); } 
    }

    .mesa-card { 
      background: rgba(255, 255, 255, 0.03); 
      border: 1px solid var(--border); 
      border-radius: 20px; 
      padding: 20px 10px; 
      text-align: center; 
      cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .mesa-card::before {
      content: "🪑"; 
      font-size: 20px;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    .mesa-card h3 { font-size: 24px; margin-bottom: 2px; font-weight: 700; }
    .mesa-card p { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }

    .mesa-card.disponivel { border-color: rgba(0, 230, 118, 0.2); color: var(--success); }
    
    .mesa-card.ocupada { 
      border-color: var(--danger);
      background: linear-gradient(145deg, #1a0a0a, #050505);
      box-shadow: 0 0 15px rgba(255, 77, 77, 0.1);
    }
    .mesa-card.ocupada h3 { color: var(--danger); }
    .mesa-card.ocupada p { color: var(--text); }

    .mesa-card:active { transform: scale(0.95); }

    /* --- MODAL E COMPONENTES --- */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; z-index: 1000; padding: 10px; overflow-y: auto; }
    .modal-content { background: var(--card); width: 100%; max-width: 950px; min-height: 90vh; border-radius: 24px; padding: 20px; display: flex; flex-direction: column; margin: auto; border: 1px solid var(--border); }
    .modal-body { display: flex; flex-direction: column; gap: 20px; flex-grow: 1; }
    @media(min-width: 850px) { .modal-body { display: grid; grid-template-columns: 1.3fr 0.7fr; height: 75vh; } }

    .scroll-area { overflow-y: auto; padding-right: 5px; }

    /* Cardápio Accordion */
    .cat-container { margin-bottom: 10px; border-radius: 12px; background: #1a1a1a; border: 1px solid #252525; overflow: hidden; }
    .cat-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 700; color: var(--accent); font-size: 14px; text-transform: uppercase; }
    .cat-content { display: none; padding: 10px; grid-template-columns: 1fr; gap: 8px; border-top: 1px solid #252525; }
    .cat-content.open { display: grid; }
    @media(min-width: 480px) { .cat-content { grid-template-columns: 1fr 1fr; } }

    .item-btn { background: #222; padding: 14px; border-radius: 10px; cursor: pointer; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .item-btn:active { transform: scale(0.97); background: #333; }
    .item-btn span { font-size: 14px; font-weight: 500; }
    .item-btn b { color: var(--accent); font-size: 14px; }

    /* Resumo do Pedido */
    .resumo-container { background: #080808; padding: 20px; border-radius: 20px; border: 1px solid #222; display: flex; flex-direction: column; }
    .itens-lista { flex-grow: 1; margin: 15px 0; max-height: 300px; overflow-y: auto; }
    .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1a1a1a; }
    
    .btn-action { padding: 16px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; width: 100%; font-size: 15px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
    .btn-cozinha { background: var(--accent); color: #000; }
    .btn-fechar { background: var(--success); color: #000; }
    .btn-del-item { background: #2a1010; color: #ff4d4d; border: none; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .badge-status { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; text-transform: uppercase; font-weight: 700; }
    .status-pendente { background: #443300; color: #ffb800; }
    .status-pronto { background: #00331a; color: #00e676; }

    /* SweetAlert Customizado */
    .swal2-popup { border-radius: 24px !important; background: #121212 !important; color: #ffffff !important; border: 1px solid #333 !important; }
    .swal2-title { color: #fff !important; }
    .swal2-select, .swal2-input { background: #222 !important; color: #fff !important; border: 1px solid #444 !important; border-radius: 12px !important; }
    .swal2-confirm { background-color: var(--accent) !important; color: #000 !important; font-weight: 700 !important; border-radius: 12px !important; }
    .swal2-cancel { background-color: #333 !important; color: #fff !important; border-radius: 12px !important; }

  </style>
</head>

// 1. Variável global para o carrinho do balcão
let carrinhoBalcaoItems = [];

// 2. Função para Renderizar o Cardápio na aba Balcão
window.renderCardapioBalcao = () => {
    const container = document.getElementById('cardapioBalcao');
    container.innerHTML = "";
    for(let cat in cardapio) {
        const div = document.createElement('div');
        div.className = 'cat-container';
        div.innerHTML = `<div class="cat-header" onclick="toggleCat(this)">${cat} <span>▾</span></div>`;
        const content = document.createElement('div');
        content.className = 'cat-content';
        cardapio[cat].forEach(it => {
            const btn = document.createElement('div');
            btn.className = 'item-btn';
            // Chama a função de processar item específica do balcão
            btn.onclick = () => processarItemBalcao(it);
            btn.innerHTML = `<span>${it.nome}</span><b>R$ ${it.preco.toFixed(2)}</b>`;
            content.appendChild(btn);
        });
        div.appendChild(content);
        container.appendChild(div);
    }
};

// 3. Função para processar escolhas (Adicionais/Marcas) no Balcão
// --- 1. GERENCIADOR DE TAXA E CARRINHO ---
window.atualizarTaxa = () => {
    const bairroSelect = document.getElementById('balcao-bairro');
    const taxaInput = document.getElementById('taxa-entrega');
    if (!bairroSelect || !taxaInput) return;

    const bairro = bairroSelect.value;
    // Paulistão e Itinga R$ 4,00 | Outros R$ 2,00
    const valorTaxa = (bairro === "Paulistão" || bairro === "Itinga-PA") ? 4.00 : (bairro ? 2.00 : 0);

    taxaInput.value = valorTaxa;
    window.atualizarListagemBalcao(); 
};

window.atualizarListagemBalcao = () => {
    const lista = document.getElementById('itensBalcao');
    const totalEl = document.getElementById('totalBalcao');
    const taxaInput = document.getElementById('taxa-entrega');
    if (!lista || !totalEl) return;

    const valorTaxa = parseFloat(taxaInput?.value) || 0;
    
    if(carrinhoBalcaoItems.length === 0 && valorTaxa === 0) {
        lista.innerHTML = `<p style="text-align:center; color:var(--text-dim); margin-top:20px;">Carrinho vazio</p>`;
        totalEl.innerText = "R$ 0,00";
        return;
    }

    let subtotalItens = 0;
    let html = carrinhoBalcaoItems.map((it, idx) => {
        subtotalItens += it.preco;
        return `
        <div class="item-row">
          <div>
            <b>${it.nome}</b>
            ${it.obs ? `<br><small style="color:var(--success)">Obs: ${it.obs}</small>` : ''}
          </div>
          <div style="display:flex; align-items:center; gap:10px">
            <b>R$ ${it.preco.toFixed(2)}</b>
            <button onclick="removerItemBalcao(${idx})" class="btn-del-item">✕</button>
          </div>
        </div>`;
    }).join('');

    if (valorTaxa > 0) {
        html += `
        <div class="item-row" style="border-top: 1px dashed #444; margin-top: 10px; padding-top: 10px; color: var(--accent)">
          <span>🛵 Taxa de Entrega (${document.getElementById('balcao-bairro').value})</span>
          <b>R$ ${valorTaxa.toFixed(2)}</b>
        </div>`;
    }

    lista.innerHTML = html;
    totalEl.innerText = `R$ ${(subtotalItens + valorTaxa).toFixed(2)}`;
};

window.removerItemBalcao = (idx) => {
    carrinhoBalcaoItems.splice(idx, 1);
    if (carrinhoBalcaoItems.length === 0) {
        document.getElementById('balcao-bairro').value = "";
        document.getElementById('taxa-entrega').value = "0";
    }
    window.atualizarListagemBalcao();
};

// --- 2. PROCESSAMENTO MANUAL E ADICIONAIS ---
window.processarItemBalcao = async (item) => {
    let nomeFinal = item.nome, precoFinal = item.preco;
    
    if(item.marcas) {
        const { value: marca } = await Swal.fire({
            title: 'Marca', input: 'select',
            inputOptions: item.marcas.reduce((o, m) => { o[m] = m; return o; }, {})
        });
        if(!marca) return;

        });

// --- 3. IMPORTADOR INTELIGENTE DO WHATSAPP ---
window.processarTextoZap = () => {
    const campo = document.getElementById('importarZap');
    const campoNome = document.getElementById('balcao-nome');
    const campoTel = document.getElementById('balcao-tel');
    const textoOriginal = campo.value;
    
    if (!textoOriginal.trim()) return;

    // 1. CAPTURA DE TELEFONE
    const matchTel = textoOriginal.match(/(?:\+?55\s?)?\(?\d{2}\)?\s?\d{4,5}-?\d{4}/);
    if (matchTel && campoTel) campoTel.value = matchTel[0].replace(/\D/g, '');

    const linhas = textoOriginal.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const bairrosOficiais = ["Centro", "Coqueiral", "Vila Emanuela", "Célio Braz", "Vila Samuel", "Jardim Planalto", "Parq. Primavera", "São Sebastião", "Paraiso", "São João", "Vila Jamily", "Itinga-PA", "Paulistão"];
    const meuNomeZap = "JHONNY BAGDA"; 
    const ignorarNoNome = ["BOA NOITE", "BOA TARDE", "BOM DIA", "OI", "OLÁ", "OLA", "QUAL", "ENDEREÇO", "FORMA", "PAGAMENTO", "OK", "PIX", "CARTAO", "DINHEIRO", "QUANDO", "ESTIVER", "SAINDO"];

    // 2. LÓGICA DE NOME
    let nomeEncontrado = "";
    for (let i = 0; i < linhas.length; i++) {
        let linha = linhas[i];
        let linhaUP = linha.toUpperCase();
        if (linha.includes(']') && linha.includes(':')) {
            let match = linha.match(/\]\s*([^:]+):/);
            if (match && match[1]) {
                let n = match[1].trim();
                if (!n.toUpperCase().includes(meuNomeZap)) { nomeEncontrado = n; break; }
            }
        } else if (linha.length > 2 && linha.length < 25 && !linha.includes(':') && !linha.includes('/') && !/\d/.test(linha)) {
            const ehSaudacao = ignorarNoNome.some(palavra => linhaUP.includes(palavra));
            if (!ehSaudacao && !linhaUP.includes(meuNomeZap)) { nomeEncontrado = linha; }
        }
    }
    if (nomeEncontrado) campoNome.value = nomeEncontrado;

    // 3. PROCESSAMENTO DE ITENS
    linhas.forEach((linha) => {
        if (linha.toUpperCase().includes(meuNomeZap)) return;

        let conteudoLimpo = linha;
        if (linha.includes(']')) {
            const partes = linha.split(':');
            if (partes.length >= 3) conteudoLimpo = partes.slice(2).join(':').trim();
        } else if (linha.includes(':')) {
            const partes = linha.split(':');
            conteudoLimpo = partes.slice(1).join(':').trim();
        }
        
        const textoParaComparar = conteudoLimpo.toUpperCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            .replace(/[,\.]/g, '');

        for (let cat in cardapio) {
            cardapio[cat].forEach(prod => {
                const nomeProdNorm = prod.nome.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                const palavrasChave = nomeProdNorm.replace(/-/g, ' ').split(' ').filter(p => p.length > 1);

                const encontrouTodas = palavrasChave.every(palavra => textoParaComparar.includes(palavra));
                const ehLancheX = prod.nome.toUpperCase().startsWith('X-');
                const encontrouX = ehLancheX && textoParaComparar.includes(nomeProdNorm.replace('-', ''));

                if (encontrouTodas || encontrouX) {
                    const regexQtd = new RegExp(`(\\d+)\\s*[X\\s]*`, 'i');
                    const matchQtd = conteudoLimpo.match(regexQtd);
                    let qtd = matchQtd ? parseInt(matchQtd[1]) : 1;

                    let obsFinal = ""; 
                    const idxProd = textoParaComparar.indexOf(palavrasChave[0]);
                    
                    if (idxProd !== -1) {
                        let resto = conteudoLimpo.substring(idxProd + prod.nome.length).trim();
                        
                        // --- VERIFICAÇÃO DE "ITEM DISFARÇADO DE OBS" ---
                        let restoUP = resto.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        let restoEhOutroItem = false;

                        // Varre o cardápio todo para ver se o resto da frase contém outro produto
                        for (let c in cardapio) {
                            cardapio[c].forEach(p => {
                                const pNome = p.nome.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                                if (restoUP.includes(pNome) && pNome.length > 3) {
                                    restoEhOutroItem = true;
                                }
                            });
                        }

                        // Só salva a Obs se não for outro item e tiver algo escrito
                        if (!restoEhOutroItem && resto.length > 2) {
                            // Limpa conectores do início da obs
                            obsFinal = resto.replace(/^( e | e uma | uma | e um | um | com | de | em )/i, '').replace(/^[:\-\s]+/, '').trim();
                            // Filtro final contra palavras lixo
                            if (["ZAP", "ATA", "LATAS", "LATA"].includes(obsFinal.toUpperCase())) obsFinal = "";
                        }
                    }

                    const jaTem = carrinhoBalcaoItems.some(i => i.nome === prod.nome && i.linhaRef === linha);
                    if (!jaTem) {
                        for(let i = 0; i < qtd; i++) {
                            carrinhoBalcaoItems.push({ nome: prod.nome, preco: prod.preco, obs: obsFinal, linhaRef: linha });
                        }
                    }
                }
            });
        }

        // 4. ENDEREÇO E PAGAMENTO
        const conteudoUP = conteudoLimpo.toUpperCase();
        if (["RUA", "AV.", "Nº", "CASA", "QUADRA", "LOTE", "BURITI"].some(p => conteudoUP.includes(p))) {
            document.getElementById('balcao-end').value = conteudoLimpo;
        }
        bairrosOficiais.forEach(b => {
            if (conteudoUP.includes(b.toUpperCase())) {
                document.getElementById('balcao-bairro').value = b;
                window.atualizarTaxa(); 
            }
        });
        if (conteudoUP.includes("PIX")) document.getElementById('balcao-pag').value = "PIX";
        else if (conteudoUP.includes("CARTAO") || conteudoUP.includes("CARTÃO")) document.getElementById('balcao-pag').value = "Cartao";
        else if (conteudoUP.includes("DINHEIRO")) document.getElementById('balcao-pag').value = "Dinheiro";
    });

    window.atualizarListagemBalcao();
    campo.value = "";
    Swal.fire({ title: 'Pedido Importado!', icon: 'success', timer: 800, showConfirmButton: false });
};

    };

window.apagarTodosPedidos = async () => {
    // 1. Verifica a senha antes de qualquer coisa
    const acessoenvolvido = await validarAcesso();
    if (!acessoenvolvido) return;

    // 2. Confirmação visual para não apagar por erro
    const result = await Swal.fire({
        title: 'Zerar todo o sistema?',
        text: "Isso apagará todos os pedidos do banco de dados!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ff4d4d',
        cancelButtonColor: '#666',
        confirmButtonText: 'Sim, Apagar Tudo!',
        cancelButtonText: 'Cancelar'
    });

    if (result.isConfirmed) {
        try {
            // Exibe um carregando (melhora a experiência)
            Swal.fire({ title: 'Limpando...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            // 3. Pega todos os documentos da coleção "pedidos"
            const querySnapshot = await getDocs(collection(db, "pedidos"));
            
            // 4. Deleta um por um
            const promessasDeDelete = querySnapshot.docs.map(documento => 
                deleteDoc(doc(db, "pedidos", documento.id))
            );
            
            await Promise.all(promessasDeDelete);

            // 5. Sucesso
            Swal.fire('Sistema Limpo!', 'Todos os pedidos foram removidos.', 'success');
            
            // Opcional: recarrega a página ou a lista
            if (window.atualizarListagemBalcao) window.atualizarListagemBalcao();
            
        } catch (erro) {
            console.error("Erro ao apagar pedidos:", erro);
            Swal.fire('Erro!', 'Não foi possível apagar os dados.', 'error');
        }
    }
};
  </script>
