<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
  <title>JHONNYBAGDÁ | Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

    :root {
      --bg: #050505;
      --card: #121212;
      --accent: #ffb800;
      --text: #ffffff;
      --text-dim: #888888;
      --danger: #ff4d4d;
      --success: #00e676;
      --border: #222222;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; line-height: 1.4; }

    header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    h1 { font-size: 22px; letter-spacing: -1px; }
    h1 span { color: var(--accent); }

    .tabs { display: flex; gap: 8px; background: #111; padding: 5px; border-radius: 12px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 8px; font-weight: 600; font-size: 13px; transition: 0.3s; }
    .tab-btn.active { background: var(--accent) !important; color: #000 !important; }

    .content-section { display: none; animation: fadeIn 0.3s ease; }
    .content-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .lista { display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); }
    @media(min-width: 768px) { .lista { grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); } }

    .grid-mesas {
      display: grid;
      gap: 15px;
      grid-template-columns: repeat(2, 1fr);
    }
    @media(min-width: 768px) {
      .grid-mesas { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }

    .mesa-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .mesa-card::before { content: "🪑"; font-size: 20px; margin-bottom: 8px; opacity: 0.5; }
    .mesa-card h3 { font-size: 24px; margin-bottom: 2px; font-weight: 700; }
    .mesa-card p { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
    .mesa-card.disponivel { border-color: rgba(0, 230, 118, 0.2); color: var(--success); }
    .mesa-card.ocupada {
      border-color: var(--danger);
      background: linear-gradient(145deg, #1a0a0a, #050505);
      box-shadow: 0 0 15px rgba(255, 77, 77, 0.1);
    }
    .mesa-card.ocupada h3 { color: var(--danger); }
    .mesa-card.ocupada p { color: var(--text); }
    .mesa-card:active { transform: scale(0.95); }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; z-index: 1000; padding: 10px; overflow-y: auto; }
    .modal-content { background: var(--card); width: 100%; max-width: 950px; min-height: 90vh; border-radius: 24px; padding: 20px; display: flex; flex-direction: column; margin: auto; border: 1px solid var(--border); }
    .modal-body { display: flex; flex-direction: column; gap: 20px; flex-grow: 1; }
    @media(min-width: 850px) { .modal-body { display: grid; grid-template-columns: 1.3fr 0.7fr; height: 75vh; } }

    .scroll-area { overflow-y: auto; padding-right: 5px; }

    .cat-container { margin-bottom: 10px; border-radius: 12px; background: #1a1a1a; border: 1px solid #252525; overflow: hidden; }
    .cat-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 700; color: var(--accent); font-size: 14px; text-transform: uppercase; }
    .cat-content { display: none; padding: 10px; grid-template-columns: 1fr; gap: 8px; border-top: 1px solid #252525; }
    .cat-content.open { display: grid; }
    @media(min-width: 480px) { .cat-content { grid-template-columns: 1fr 1fr; } }

    .item-btn { background: #222; padding: 14px; border-radius: 10px; cursor: pointer; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .item-btn:active { transform: scale(0.97); background: #333; }
    .item-btn span { font-size: 14px; font-weight: 500; }
    .item-btn b { color: var(--accent); font-size: 14px; }

    .resumo-container { background: #080808; padding: 20px; border-radius: 20px; border: 1px solid #222; display: flex; flex-direction: column; }
    .itens-lista { flex-grow: 1; margin: 15px 0; max-height: 300px; overflow-y: auto; }
    .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1a1a1a; }

    .btn-action { padding: 16px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; width: 100%; font-size: 15px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
    .btn-cozinha { background: var(--accent); color: #000; }
    .btn-fechar { background: var(--success); color: #000; }
    .btn-del-item { background: #2a1010; color: #ff4d4d; border: none; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .badge-status { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; text-transform: uppercase; font-weight: 700; }
    .status-pendente { background: #443300; color: #ffb800; }
    .status-pronto { background: #00331a; color: #00e676; }

    .swal2-popup { border-radius: 24px !important; background: #121212 !important; color: #ffffff !important; border: 1px solid #333 !important; }
    .swal2-title { color: #fff !important; }
    .swal2-select, .swal2-input { background: #222 !important; color: #fff !important; border: 1px solid #444 !important; border-radius: 12px !important; }
    .swal2-confirm { background-color: var(--accent) !important; color: #000 !important; font-weight: 700 !important; border-radius: 12px !important; }
    .swal2-cancel { background-color: #333 !important; color: #fff !important; border-radius: 12px !important; }

    #sugestoes-clientes div:hover { background: #333 !important; }
    @media(min-width: 850px) { .layout-balcao { grid-template-columns: 1.3fr 0.7fr !important; } }

    /* Balanço */
    .balanco-filtros { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .balanco-card { background: #121212; border: 1px solid #222; border-radius: 16px; padding: 20px; margin-bottom: 15px; }
    .balanco-card h3 { color: var(--accent); margin-bottom: 10px; }
    .balanco-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
    .balanco-item { background: #1a1a1a; border-radius: 12px; padding: 15px; text-align: center; }
    .balanco-item span { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
    .balanco-item b { font-size: 20px; color: var(--accent); }
  </style>
</head>

<div>

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.2/firebase-app.js";
  import { getFirestore, collection, onSnapshot, orderBy, query, where, deleteDoc, doc, addDoc, setDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.5.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBHBcJHtU_o8tjsJCSoCsO665M3N72mF8g",
    authDomain: "meusiteaki2025.firebaseapp.com",
    projectId: "meusiteaki2025",
    storageBucket: "meusiteaki2025.firebasestorage.app",
    messagingSenderId: "1059720978927",
    appId: "1:1059720978927:web:c4e5fde24aa95672d0161a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const bip = document.getElementById('audio-bip');

  const SENHA_MESTRA = "bagda2026@";
  let audioPermitido = false;
  let mesaAtiva = null;
  let mesasConsumo = {};
  let listaClientesCache = [];
  let carrinhoBalcaoItems = [];
  let todosPedidosCache = [];

  const atendentes = ["Ariela", "Jhonny"];

  const cardapio = {
    "Lanches": [
      { nome:"Misto", preco:6 }, { nome:"Americano", preco:10 }, { nome:"X-Salsicha", preco:12 },
      { nome:"Bauru Simples", preco:12 }, { nome:"Bauru Especial", preco:14 }, { nome:"Hambúrguer", preco:14 },
      { nome:"X-Catupiry", preco:14 }, { nome:"X-Salada Simples", preco:14 }, { nome:"X-Abacaxi", preco:16 },
      { nome:"X-Salada Especial", preco:15 }, { nome:"X-Banana", preco:16 }, { nome:"X-Calabresa Simples", preco:15 },
      { nome:"X-Calabresa Especial", preco:17 }, { nome:"X-Bacon", preco:17 }, { nome:"X-Frango Simples", preco:15 },
      { nome:"X-Frango Especial", preco:17 }, { nome:"X-Tudo", preco:18 }, { nome:"X-Filé", preco:25 },
      { nome:"X-Jhone Broca", preco:22 }, { nome:"X-Completação", preco:26 }, { nome:"X-Arrisca", preco:28 }, { nome:"X-Filé Acebolado", preco:28 }

  // --- INICIALIZAÇÃO ---
  async function carregarClientes() {
    const snap = await getDocs(collection(db, "clientes"));
    listaClientesCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }
  carregarClientes();

  async function validarAcesso() {
    const { value: senha } = await Swal.fire({
      title: 'Acesso Restrito', input: 'password', inputPlaceholder: 'Senha', showCancelButton: true
    });
    if (senha === SENHA_MESTRA) return true;
    if (senha) Swal.fire('Erro', 'Senha Incorreta', 'error');
    return false;
  }

  // --- BALCÃO/PDV ---
  window.renderCardapioBalcao = () => {
    const container = document.getElementById('cardapioBalcao');
    if (!container) return;
    container.innerHTML = "";
    for (let cat in cardapio) {
      const div = document.createElement('div');
      div.className = 'cat-container';
      div.innerHTML = `<div class="cat-header" onclick="toggleCat(this)">${cat} <span>▾</span></div>`;
      const content = document.createElement('div');
      content.className = 'cat-content';
      cardapio[cat].forEach(it => {
        const btn = document.createElement('div');
        btn.className = 'item-btn';
        btn.onclick = () => processarItemBalcao(it);
        btn.innerHTML = `<span>${it.nome}</span><b>R$ ${it.preco.toFixed(2)}</b>`;
        content.appendChild(btn);
      });
      div.appendChild(content);
      container.appendChild(div);
    }
  };

  window.buscarCliente = (termo) => {

    if (ini) {
      const dataIni = new Date(ini + 'T00:00:00');

        if (!p.timestamp) return false;
        return p.timestamp.toDate() >= dataIni;
      });

      const dataFim = new Date(fim + 'T23:59:59');

        if (!p.timestamp) return false;
        return p.timestamp.toDate() <= dataFim;
      });

  if (filtrados.length === 0) {
    lista.innerHTML = `<p style="text-align:center;color:var(--text-dim);padding:20px">Nenhum cliente encontrado</p>`;
    return;
  }

  // Agrupa de 2 em 2
  let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
  filtrados.forEach(c => {
    const favs = Array.isArray(c.favoritos) ? c.favoritos : (c.favorito ? [c.favorito] : []);
    html += `
      <div style="background:#1a1a1a;border:1px solid #333;border-radius:14px;overflow:hidden;">
        <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'; this.querySelector('.seta').textContent=this.nextElementSibling.style.display==='none'?'▶':'▼'"
          style="padding:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;">
          <div>
            <b style="color:var(--accent);font-size:13px">${c.nome || '—'}</b><br>
            <small style="color:var(--text-dim);font-size:11px">📞 ${c.telefone || '—'}</small>
          </div>
          <span class="seta" style="color:var(--accent);font-size:12px;">▶</span>
        </div>
        <div style="display:none;padding:0 12px 12px;border-top:1px solid #252525;">
          <small style="color:var(--text-dim);display:block;margin-bottom:4px">📍 ${c.bairro || '—'}</small>
          <small style="color:#555;display:block;margin-bottom:4px">${c.endereco || ''}</small>
          ${favs.length ? `<small style="color:#888">⭐ ${favs.join(' · ')}</small>` : ''}
          <div style="display:flex;gap:6px;margin-top:10px">
            <button onclick="editarCliente('${c.id}')" style="flex:1;background:#1a2a1a;color:var(--success);border:1px solid var(--success);padding:6px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700">✏️ EDITAR</button>
            <button onclick="deletarCliente('${c.id}')" style="flex:1;background:#2a1010;color:var(--danger);border:1px solid var(--danger);padding:6px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700">🗑️ APAGAR</button>
          </div>
        </div>
      </div>`;
  });
  html += '</div>';
  lista.innerHTML = html;
};

  window.editarCliente = async (id) => {
  const c = listaClientesCache.find(x => x.id === id);
  if (!c) return;
  const favs = Array.isArray(c.favoritos) ? c.favoritos : (c.favorito ? [c.favorito] : []);
  const { value: form } = await Swal.fire({
    title: 'Editar Cliente',
    html: `
      <input id="ed-nome" class="swal2-input" placeholder="Nome" value="${c.nome || ''}">
      <input id="ed-tel"  class="swal2-input" placeholder="Telefone" value="${c.telefone || ''}">
      <input id="ed-end"  class="swal2-input" placeholder="Endereço" value="${c.endereco || ''}">
      <input id="ed-bai"  class="swal2-input" placeholder="Bairro" value="${c.bairro || ''}">
      <input id="ed-fav1" class="swal2-input" placeholder="⭐ Favorito 1" value="${favs[0] || ''}">
      <input id="ed-fav2" class="swal2-input" placeholder="⭐ Favorito 2" value="${favs[1] || ''}">
      <input id="ed-fav3" class="swal2-input" placeholder="⭐ Favorito 3" value="${favs[2] || ''}">
      <input id="ed-fav4" class="swal2-input" placeholder="⭐ Favorito 4" value="${favs[3] || ''}">`,
    showCancelButton: true, confirmButtonText: 'Salvar',
    preConfirm: () => ({
      nome:      document.getElementById('ed-nome').value.trim().toUpperCase(),
      telefone:  document.getElementById('ed-tel').value.trim(),
      endereco:  document.getElementById('ed-end').value.trim(),
      bairro:    document.getElementById('ed-bai').value.trim(),
      favoritos: [
        document.getElementById('ed-fav1').value.trim(),
        document.getElementById('ed-fav2').value.trim(),
        document.getElementById('ed-fav3').value.trim(),
        document.getElementById('ed-fav4').value.trim(),
      ].filter(Boolean),
    })
  });
  if (!form) return;
  await setDoc(doc(db, "clientes", id), form, { merge: true });
  await carregarClientes();
  filtrarListaClientes(document.getElementById('filtroClientes').value);
  Swal.fire({ title: 'Salvo!', icon: 'success', timer: 800, showConfirmButton: false });
};

  window.deletarCliente = async (id) => {
    const result = await Swal.fire({ title: 'Apagar cliente?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Apagar' });
    if (!result.isConfirmed) return;
    await deleteDoc(doc(db, "clientes", id));
    await carregarClientes();
    filtrarListaClientes(document.getElementById('filtroClientes').value);
    Swal.fire({ title: 'Apagado!', icon: 'success', timer: 800, showConfirmButton: false });
  };

  // --- UTILITÁRIOS ---
  window.deletarDoc = async (id) => { if (confirm('Excluir pedido?')) await deleteDoc(doc(db, "pedidos", id)); };
  window.fecharModal = () => { mesaAtiva = null; document.getElementById('modalMesa').style.display = 'none'; };
  window.toggleAdminMenu = () => { const m = document.getElementById('adminMenu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; };
  window.toggleCat = (el) => {
    const content = el.nextElementSibling;
    const isOpen = content.classList.contains('open');
    document.querySelectorAll('.cat-content').forEach(c => c.classList.remove('open'));
    if (!isOpen) content.classList.add('open');
  };

  function renderAccordion() {
    const container = document.getElementById('cardapioRender');
    container.innerHTML = "";
    for (let cat in cardapio) {
      const div = document.createElement('div');
      div.className = 'cat-container';
      div.innerHTML = `<div class="cat-header" onclick="toggleCat(this)">${cat} <span>▾</span></div>`;
      const content = document.createElement('div');
      content.className = 'cat-content';
      cardapio[cat].forEach(it => {
        const btn = document.createElement('div');
        btn.className = 'item-btn';
        btn.onclick = () => processarItem(it);
        btn.innerHTML = `<span>${it.nome}</span><b>R$ ${it.preco.toFixed(2)}</b>`;
        content.appendChild(btn);
      });
      div.appendChild(content);
      container.appendChild(div);
    }
  }

  window.copiarTextoPedido = (p) => {
    const itens = (p.itens || []).map(it => `• ${it.name}`).join('\n');
    const msg = `*BAGDÁ - RESUMO*\n👤 ${p.cliente}\n📍 ${p.endereco}\n---\n${itens}\n---\n💰 *Total: ${p.total}*`;
    navigator.clipboard.writeText(msg);
    Swal.fire({ title: 'Copiado!', icon: 'success', timer: 800, showConfirmButton: false });
  };

  document.getElementById('btnAtivarAudio').onclick = function () {
    audioPermitido = true;
    this.innerHTML = "✅ SOM ATIVO";
    tocarBip();
    setTimeout(() => toggleAdminMenu(), 600);
  };

  const tocarBip = () => { if (audioPermitido && bip) { bip.currentTime = 0; bip.play().catch(e => {}); } };

  window.apagarTodosPedidos = async () => {
    if (!(await validarAcesso())) return;
    const result = await Swal.fire({ title: 'Zerar?', text: "Apagar todos os pedidos?", icon: 'warning', showCancelButton: true });
    if (result.isConfirmed) {
      const snap = await getDocs(collection(db, "pedidos"));
      snap.docs.forEach(d => deleteDoc(doc(db, "pedidos", d.id)));
      Swal.fire('Limpo!', '', 'success');
    }
  };

  window.salvarSomenteCliente = async () => {
  const nome = document.getElementById('balcao-nome').value.trim().toUpperCase();
  const tel  = document.getElementById('balcao-tel').value.trim();
  const end  = document.getElementById('balcao-end').value.trim();
  const bairro = document.getElementById('balcao-bairro').value;

  if (!nome) return Swal.fire('Atenção', 'Informe ao menos o nome!', 'warning');

  const idCliente = tel ? tel.replace(/\D/g, '') : nome.replace(/\s/g, '_');
  await setDoc(doc(db, "clientes", idCliente), { nome, telefone: tel, endereco: end, bairro }, { merge: true });
  await carregarClientes();
  Swal.fire({ title: 'Cliente salvo!', icon: 'success', timer: 900, showConfirmButton: false });
};

/* Security */
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&(e.key==='u'||e.key==='U'||(e.shiftKey&&e.key==='I'))))e.preventDefault()});
</script>
</script>
